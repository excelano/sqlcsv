# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sqlcsv
    main: .
    binary: sqlcsv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: sqlcsv
    name_template: "sqlcsv_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - GRAMMAR.md

nfpms:
  - id: sqlcsv
    package_name: sqlcsv
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      SQL REPL for CSV files. Sibling to spsql.
      In-memory edits with type inference, dry-run writes, and a parser
      shared with spsql. Same SQL subset (SELECT/UPDATE/DELETE/INSERT)
      against the bound CSV file.
    homepage: https://github.com/excelano/sqlcsv
    license: MIT
    formats:
      - deb
    section: database
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/sqlcsv/copyright
      - src: ./README.md
        dst: /usr/share/doc/sqlcsv/README.md
      - src: ./GRAMMAR.md
        dst: /usr/share/doc/sqlcsv/GRAMMAR.md

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  # Ship install.sh alongside the platform tarballs so users can pin to a
  # specific release URL instead of relying on the rolling main branch.
  extra_files:
    - glob: install.sh
    - glob: uninstall.sh

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
